---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-argocd
  namespace: argocd
spec:
  parentRefs:
    - name: cilium
      namespace: kube-system

  hostnames:
    - argo-cd.localhost

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80